<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>{% block title %}Crypto Simulator{% endblock %}</title>

<!-- bootstrap link -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- css link -->
<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- block to link a navbar (userNavbar.html or adminNavbar.html)-->
{% block navbar %}{% endblock %}

<div class="main-content">

    <!-- a block of content, write info inside -->
    {% block content %}
    {% endblock %}

</div>

<!-- add a footer to the layout linking footer.html -->
{% include "footer.html" %}

</body>
</html>
